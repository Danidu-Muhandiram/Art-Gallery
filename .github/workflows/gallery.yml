name: Auto Generate Gallery

on:
  push:
    paths:
      - "public/wallpapers/**"
      - "public/backgrounds/**"

jobs:
  generate-gallery:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate gallery
        run: node scripts/generate-gallery.js

      - name: Commit gallery changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/gallery.json

          git diff --cached --quiet || git commit -m "Auto update gallery"

          git push